<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Bassey Okon — AI Workflow Builder & Remote Operations Specialist. Based in Nigeria, available for remote work globally." />
  <meta name="keywords"
    content="AI workflow, automation, remote operations, Nigeria, freelance, Zapier, Notion, Airtable" />
  <meta name="author" content="Bassey Okon" />
  <meta property="og:title" content="Bassey Okon | AI Workflow Builder" />
  <meta property="og:description"
    content="I design automation systems, lightweight web tools, and scalable workflows that help startups move faster." />
  <meta property="og:type" content="website" />
  <title>Bassey Okon | AI Workflow Builder & Remote Operations Specialist</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet" />

  <style>
    /* ============================================
       CSS CUSTOM PROPERTIES & THEME SYSTEM
    ============================================ */
    :root {
      --blue-50: #eff6ff;
      --blue-100: #dbeafe;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
      --blue-900: #1e3a8a;

      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --bg-card: #ffffff;
      --bg-subtle: #f1f5f9;

      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --text-inverse: #ffffff;

      --border: #e2e8f0;
      --border-subtle: #f1f5f9;

      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-light: #dbeafe;

      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.07), 0 2px 4px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.10), 0 4px 8px rgba(0, 0, 0, 0.05);

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;

      --nav-bg: rgba(255, 255, 255, 0.9);
      --nav-border: rgba(226, 232, 240, 0.8);
    }

    [data-theme="dark"] {
      --bg-primary: #0a0f1e;
      --bg-secondary: #0f1629;
      --bg-card: #131d35;
      --bg-subtle: #1a2540;

      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --text-inverse: #0f172a;

      --border: #1e2d4a;
      --border-subtle: #162038;

      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --accent-light: #1e3a8a;

      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);

      --nav-bg: rgba(10, 15, 30, 0.9);
      --nav-border: rgba(30, 45, 74, 0.8);
    }

    /* ============================================
       RESET & BASE
    ============================================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      transition: background 0.3s ease, color 0.3s ease;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    ul {
      list-style: none;
    }

    .container {
      width: 100%;
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 24px;
    }

    section {
      padding: 100px 0;
    }

    /* ============================================
       TYPOGRAPHY
    ============================================ */
    h1,
    h2,
    h3,
    h4 {
      font-family: 'Sora', sans-serif;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .section-label::before {
      content: '';
      display: block;
      width: 20px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
    }

    .section-title {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .section-subtitle {
      font-size: 17px;
      color: var(--text-secondary);
      max-width: 560px;
      line-height: 1.7;
    }

    /* ============================================
       BUTTONS
    ============================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
    }

    .btn-outline {
      background: transparent;
      color: var(--text-primary);
      border: 1.5px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    /* ============================================
       NAVBAR
    ============================================ */
    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: var(--nav-bg);
      border-bottom: 1px solid var(--nav-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: all 0.3s ease;
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
    }

    .nav-logo {
      font-family: 'Sora', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .nav-logo span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.15s ease;
    }

    .nav-links a:hover {
      color: var(--text-primary);
      background: var(--bg-subtle);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Dark mode toggle */
    #theme-toggle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      transition: all 0.2s ease;
      color: var(--text-secondary);
    }

    #theme-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Mobile menu */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      background: none;
      border: none;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text-primary);
      border-radius: 2px;
      transition: all 0.3s;
    }

    .mobile-menu {
      display: none;
      flex-direction: column;
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      gap: 4px;
    }

    .mobile-menu a {
      font-size: 15px;
      color: var(--text-secondary);
      padding: 10px 12px;
      border-radius: 8px;
      transition: all 0.15s;
    }

    .mobile-menu a:hover {
      background: var(--bg-subtle);
      color: var(--text-primary);
    }

    .mobile-menu.open {
      display: flex;
    }

    /* ============================================
       HERO SECTION
    ============================================ */
    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 68px;
      padding-bottom: 60px;
      position: relative;
      overflow: hidden;
    }

    /* Animated background */
    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .hero-bg-grad {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
    }

    .hero-bg-grad.g1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #2563eb, transparent);
      top: -150px;
      right: -100px;
      animation: float1 10s ease-in-out infinite;
    }

    .hero-bg-grad.g2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #3b82f6, transparent);
      bottom: 50px;
      left: -80px;
      animation: float2 14s ease-in-out infinite;
    }

    .hero-bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 50px 50px;
      opacity: 0.3;
    }

    @keyframes float1 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(-30px, 30px) scale(1.05);
      }
    }

    @keyframes float2 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(20px, -20px) scale(1.08);
      }
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 720px;
      padding-top: 48px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px 6px 10px;
      background: var(--accent-light);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.2s forwards;
    }

    .hero-badge-location {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px 6px 10px;
      background: #f0fdf4;
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      color: #16a34a;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.28s forwards;
    }

    [data-theme="dark"] .hero-badge-location {
      background: #052e16;
      border-color: rgba(34, 197, 94, 0.25);
      color: #4ade80;
    }

    .hero-badges {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
    }

    .location-dot {
      width: 8px;
      height: 8px;
      background: #16a34a;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.5);
      animation: locationPulse 2.2s ease-in-out infinite;
    }

    [data-theme="dark"] .location-dot {
      background: #4ade80;
      box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.5);
    }

    @keyframes locationPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.55);
      }

      50% {
        box-shadow: 0 0 0 7px rgba(22, 163, 74, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(22, 163, 74, 0);
      }
    }

    [data-theme="dark"] .hero-badge-location .location-dot {
      animation-name: locationPulseDark;
    }

    @keyframes locationPulseDark {
      0% {
        box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.55);
      }

      50% {
        box-shadow: 0 0 0 7px rgba(74, 222, 128, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(74, 222, 128, 0);
      }
    }

    .hero-badge .dot {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.6;
        transform: scale(0.9);
      }
    }

    .hero-name {
      font-size: clamp(44px, 7vw, 80px);
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.35s forwards;
    }

    .hero-name .accent {
      color: var(--accent);
    }

    .hero-headline {
      font-size: clamp(18px, 2.5vw, 24px);
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 20px;
      font-family: 'Sora', sans-serif;
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.45s forwards;
    }

    .hero-subheading {
      font-size: 17px;
      color: var(--text-secondary);
      line-height: 1.75;
      max-width: 560px;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.55s forwards;
    }

    .hero-ctas {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.65s forwards;
    }
</body>
</html>
