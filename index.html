<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Bassey Okon — AI Workflow Builder & Remote Operations Specialist. Based in Nigeria, available for remote work globally." />
  <meta name="keywords"
    content="AI workflow, automation, remote operations, Nigeria, freelance, Zapier, Notion, Airtable" />
  <meta name="author" content="Bassey Okon" />
  <meta property="og:title" content="Bassey Okon | AI Workflow Builder" />
  <meta property="og:description"
    content="I design automation systems, lightweight web tools, and scalable workflows that help startups move faster." />
  <meta property="og:type" content="website" />
  <title>Bassey Okon | AI Workflow Builder & Remote Operations Specialist</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet" />

  <style>
    /* ============================================
       CSS CUSTOM PROPERTIES & THEME SYSTEM
    ============================================ */
    :root {
      --blue-50: #eff6ff;
      --blue-100: #dbeafe;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
      --blue-900: #1e3a8a;

      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --bg-card: #ffffff;
      --bg-subtle: #f1f5f9;

      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --text-inverse: #ffffff;

      --border: #e2e8f0;
      --border-subtle: #f1f5f9;

      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-light: #dbeafe;

      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.07), 0 2px 4px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.10), 0 4px 8px rgba(0, 0, 0, 0.05);

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;

      --nav-bg: rgba(255, 255, 255, 0.9);
      --nav-border: rgba(226, 232, 240, 0.8);
    }

    [data-theme="dark"] {
      --bg-primary: #0a0f1e;
      --bg-secondary: #0f1629;
      --bg-card: #131d35;
      --bg-subtle: #1a2540;

      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --text-inverse: #0f172a;

      --border: #1e2d4a;
      --border-subtle: #162038;

      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --accent-light: #1e3a8a;

      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);

      --nav-bg: rgba(10, 15, 30, 0.9);
      --nav-border: rgba(30, 45, 74, 0.8);
    }

    /* ============================================
       RESET & BASE
    ============================================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      transition: background 0.3s ease, color 0.3s ease;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    ul {
      list-style: none;
    }

    .container {
      width: 100%;
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 24px;
    }

    section {
      padding: 100px 0;
    }

    /* ============================================
       TYPOGRAPHY
    ============================================ */
    h1,
    h2,
    h3,
    h4 {
      font-family: 'Sora', sans-serif;
      line-height: 1.15;
</body>
</html>
